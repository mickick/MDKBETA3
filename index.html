<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Karte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        #status {
            padding: 12px 15px;
            background: #ecf0f1;
            border-bottom: 1px solid #bdc3c7;
            font-size: 14px;
            color: #2c3e50;
            min-height: 40px;
            display: flex;
            align-items: center;
        }

        #map {
            flex: 1;
            width: 100%;
        }

        /* LOADING SCREEN */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loadingBox {
            background: white;
            width: 80%;
            max-width: 280px;
            padding: 30px 20px;
            border: 6px solid #000;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .loadingBox h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .progressContainer {
            background: #e0e0e0;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #333;
            margin-bottom: 15px;
        }

        .progressBar {
            background: linear-gradient(90deg, #3498db, #2980b9);
            height: 100%;
            width: 0%;
            animation: loading 6s ease-in-out forwards;
            border-radius: 8px;
        }

        @keyframes loading {
            0% { width: 10%; }
            50% { width: 60%; }
            100% { width: 95%; }
        }

        .loadingText {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }

        @media (min-width: 768px) {
            header h1 {
                font-size: 28px;
            }

            #status {
                font-size: 16px;
                padding: 15px 20px;
            }

            .loadingBox {
                width: 350px;
            }
        }
    </style>
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loadingScreen">
        <div class="loadingBox">
            <h2>Wird geladen...</h2>
            <div class="progressContainer">
                <div class="progressBar"></div>
            </div>
            <p class="loadingText">Standort wird aktualisiert</p>
        </div>
    </div>

    <header>
        <h1>📍 Meine Karte</h1>
    </header>
    <div id="status">⏳ Standort wird ermittelt...</div>
    <div id="map"></div>

    <script>
        // Flag für erfolgreiche Geolocation
        let geolocationSuccess = false;

        // Karte initialisieren
        const map = L.map('map').setView([51.5, 10], 7);

        // Kartenkacheln
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19
        }).addTo(map);

        // Marker-Variablen
        let orangeMarker = null;

        // BLAUER PIN (fest)
        L.marker([51.0522583, 13.9009817], {
            icon: L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34]
            })
        }).addTo(map).bindPopup('<b>Fester Standort</b>');

        // Funktion zum Verstecken der Loading Screen
        function hideLoadingScreen() {
            document.getElementById('loadingScreen').classList.add('hidden');
        }

        // LOADING SCREEN nach Maximum 6 Sekunden entfernen (als Fallback)
        const loadingTimeout = setTimeout(hideLoadingScreen, 6000);

        // GEOLOCATION - LIVE UPDATES JEDE SEKUNDE
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    
                    // Beim ersten erfolgreichen Standort: Loading Screen entfernen
                    if (!geolocationSuccess) {
                        geolocationSuccess = true;
                        clearTimeout(loadingTimeout);
                        hideLoadingScreen();
                    }
                    
                    // Wenn orangener Pin existiert, entfernen
                    if (orangeMarker) {
                        map.removeLayer(orangeMarker);
                    }
                    
                    // Neuen orangenen Pin hinzufügen
                    orangeMarker = L.marker([lat, lng], {
                        icon: L.icon({
                            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png',
                            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                            iconSize: [25, 41],
                            iconAnchor: [12, 41],
                            popupAnchor: [1, -34]
                        })
                    }).addTo(map).bindPopup(`<b>Dein Standort</b><br>Genauigkeit: ${Math.round(accuracy)}m`);

                    // Karte zum aktuellen Standort zoomen (nur beim ersten Mal)
                    if (map.getZoom() < 10) {
                        map.setView([lat, lng], 13);
                    } else {
                        map.panTo([lat, lng]);
                    }

                    // Status aktualisieren
                    document.getElementById('status').innerHTML = 
                        `✓ Standort aktualisiert: ${lat.toFixed(4)}, ${lng.toFixed(4)} (Genauigkeit: ${Math.round(accuracy)}m)`;
                },
                function(error) {
                    // Bei Fehler auch Loading Screen entfernen
                    clearTimeout(loadingTimeout);
                    hideLoadingScreen();
                    document.getElementById('status').innerHTML = `✗ Fehler: ${error.message}`;
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                }
            );
        } else {
            clearTimeout(loadingTimeout);
            hideLoadingScreen();
            document.getElementById('status').innerHTML = '✗ Geolocation wird nicht unterstützt';
        }
    </script>
</body>
</html>
